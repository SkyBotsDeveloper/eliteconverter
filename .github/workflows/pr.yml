name: Pull Request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm format:check
      - run: corepack pnpm lint
      - run: corepack pnpm typecheck
      - run: corepack pnpm test:unit
      - run: corepack pnpm test:integration
      - run: corepack pnpm build
      - run: corepack pnpm exec playwright install --with-deps chromium
      - run: corepack pnpm test:e2e -- --project=chromium-laptop
      - run: corepack pnpm secrets:scan
